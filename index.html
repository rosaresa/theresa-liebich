    <meta property="og:type" content="website" />
    <script>
      (() => {
        const runId = `preload-${Date.now()}`;
        const endpoint = "http://127.0.0.1:7941/ingest/67b1dbb9-2aa1-41eb-8198-7cbabab83e32";
        const send = (hypothesisId, location, message, data) =>
          fetch(endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Debug-Session-Id": "bc7aa9",
            },
            body: JSON.stringify({
              sessionId: "bc7aa9",
              runId,
              hypothesisId,
              location,
              message,
              data,
              timestamp: Date.now(),
            }),
          }).catch(() => {});

        // #region agent log
        send("H1", "index.html:head", "pre-module page context", {
          href: window.location.href,
          pathname: window.location.pathname,
          origin: window.location.origin,
        });
        // #endregion

        const moduleScript = document.querySelector("script[type='module'][src]");
        const rawSrc = moduleScript?.getAttribute("src") ?? null;
        const resolvedSrc = rawSrc ? new URL(rawSrc, window.location.href).href : null;

        // #region agent log
        send("H2", "index.html:head", "module script src resolution", {
          rawSrc,
          resolvedSrc,
        });
        // #endregion

        if (resolvedSrc) {
          fetch(resolvedSrc, { method: "HEAD" })
            .then((response) => {
              // #region agent log
              send("H3", "index.html:head", "module script HEAD result", {
                ok: response.ok,
                status: response.status,
                contentType: response.headers.get("content-type"),
              });
              // #endregion
            })
            .catch((error) => {
              // #region agent log
              send("H3", "index.html:head", "module script HEAD failed", {
                error: String(error),
              });
              // #endregion
            });
        } else {
          // #region agent log
          send("H4", "index.html:head", "module script not found in dom", {});
          // #endregion
        }
      })();
    </script>
    <script type="module" crossorigin src="/theresa-liebich/assets/index-RhLw-K64.js"></script>
